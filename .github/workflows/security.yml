name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 18 * * 5"

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Sync the frozen dependency graph
        run: |
          python -m pip install uv==0.8.22
          uv sync --frozen --extra dev
      - name: Audit locked runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          requirements="${RUNNER_TEMP}/datumguard-runtime-requirements.txt"
          uv export --frozen --no-dev --no-emit-project --format requirements-txt \
            --output-file "${requirements}"
          uv run --frozen pip-audit --strict --requirement "${requirements}"

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: never

  codeql:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - name: Analyze repository
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          category: /language:${{ matrix.language }}
