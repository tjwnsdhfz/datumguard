name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff format --check src tests
      - run: ruff check src tests
      - run: mypy src/datumguard
      - run: pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install the API used by browser integration tests
        run: python -m pip install -e .
      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run typecheck
      - working-directory: web
        run: npm run lint
      - working-directory: web
        run: npm run build
      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run architecture, piping, and plate E2E against API and web
        working-directory: web
        env:
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_DATUMGUARD_API_URL: http://127.0.0.1:8000
        run: npm run test:e2e -- --project=chromium
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: warn
          retention-days: 14

  containers:
    runs-on: ubuntu-latest
    needs: [backend, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t datumguard-api:test .
      - name: Build web Docker image
        run: docker build -t datumguard-web:test ./web
