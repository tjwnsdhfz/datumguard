name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked Python environment
        run: |
          python -m pip install uv==0.8.22
          uv sync --frozen --extra dev
      - run: uv run --frozen ruff format --check src tests tools
      - run: uv run --frozen ruff check src tests tools
      - run: uv run --frozen mypy src/datumguard
      - run: uv run --frozen pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install the API used by browser integration tests
        run: |
          python -m pip install uv==0.8.22
          uv sync --frozen --extra dev
      - working-directory: web
        run: npm ci
      - name: Audit npm dependency lock
        working-directory: web
        run: npm audit --audit-level=high
      - working-directory: web
        run: npm run typecheck
      - working-directory: web
        run: npm run lint
      - working-directory: web
        run: npm run build
      - name: Install Chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run all five CAD workspaces against the real API
        working-directory: web
        env:
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_DATUMGUARD_API_URL: http://127.0.0.1:8000
          DATUMGUARD_PYTHON: ${{ github.workspace }}/.venv/bin/python
        run: npm run test:e2e -- --project=chromium
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: warn
          retention-days: 14

  openbim-interoperability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Validate representative BCF with the pinned buildingSMART checker
        shell: bash
        env:
          BCF_SPEC_COMMIT: 5834466b2477ac700d7a61990b4e67ec1005cc68
          BCF_TOOL_DLL_SHA256: 0409626bba8a017620da95fa1b52f3bfe4f3147b9771a0e604a616a78650c3dc
        run: |
          set -euo pipefail
          spec_dir="${RUNNER_TEMP}/buildingSMART-BCF-XML"
          git init "${spec_dir}"
          git -C "${spec_dir}" remote add origin https://github.com/buildingSMART/BCF-XML.git
          git -C "${spec_dir}" fetch --depth 1 origin "${BCF_SPEC_COMMIT}"
          git -C "${spec_dir}" checkout --detach FETCH_HEAD
          test "$(git -C "${spec_dir}" rev-parse HEAD)" = "${BCF_SPEC_COMMIT}"

          dotnet restore "${spec_dir}/build/_build.csproj"
          tool_dll="${HOME}/.nuget/packages/bcf-tool.commandline/1.0.7/tools/net5.0/bcf-tool.dll"
          test -f "${tool_dll}"
          echo "${BCF_TOOL_DLL_SHA256}  ${tool_dll}" | sha256sum --check --strict

          standard_bcf="${GITHUB_WORKSPACE}/docs/awards-2026/evidence/representative/openbim-evidence.bcf"
          legacy_bcf="${GITHUB_WORKSPACE}/docs/awards-2026/evidence/representative/openbim-evidence.bcfzip"
          cmp "${standard_bcf}" "${legacy_bcf}"
          (
            cd "$(dirname "${tool_dll}")"
            DOTNET_ROLL_FORWARD=Major dotnet "${tool_dll}" check -s -g -f -r v3.0 "${standard_bcf}"
            DOTNET_ROLL_FORWARD=Major dotnet "${tool_dll}" check -s -g -f -r v3.0 "${legacy_bcf}"
          )

  containers:
    runs-on: ubuntu-latest
    needs: [backend, web, openbim-interoperability]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build backend Docker image
        run: docker build -t datumguard-api:test .
      - name: Build web Docker image
        run: docker build -t datumguard-web:test ./web
      - name: Generate backend CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: datumguard-api:test
          format: cyclonedx
          output: datumguard-api.cdx.json
          exit-code: "0"
      - name: Generate web CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: datumguard-web:test
          format: cyclonedx
          output: datumguard-web.cdx.json
          exit-code: "0"
      - name: Upload container SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-sboms-${{ github.run_id }}
          path: |
            datumguard-api.cdx.json
            datumguard-web.cdx.json
          retention-days: 30
      - name: Scan backend image for fixed critical vulnerabilities
        id: trivy_backend
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: datumguard-api:test
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan web image for fixed critical vulnerabilities
        id: trivy_web
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: datumguard-web:test
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Enforce container vulnerability gate
        if: steps.trivy_backend.outcome == 'failure' || steps.trivy_web.outcome == 'failure'
        run: |
          echo "A container image has a fixed CRITICAL vulnerability." >&2
          exit 1
