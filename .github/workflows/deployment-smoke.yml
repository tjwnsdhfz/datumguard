name: deployment-smoke

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: Vercel deployment origin to verify
        required: true
        default: https://datumguard-tjwnsdhfz.vercel.app
      capability_mode:
        description: auto is strict for production and backward-compatible for preview
        required: true
        type: choice
        default: auto
        options: [auto, base, full]

permissions:
  contents: read

concurrency:
  group: deployment-smoke-${{ github.event.deployment.id || github.run_id }}
  cancel-in-progress: true

jobs:
  web-and-api:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
      endsWith(github.event.deployment_status.environment_url, '.vercel.app'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOYMENT_URL: ${{ inputs.deployment_url || github.event.deployment_status.environment_url }}
      API_URL: https://datumguard-api.onrender.com
      CAPABILITY_MODE: ${{ inputs.capability_mode || 'auto' }}
      DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment || 'workflow_dispatch' }}
      VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - name: Check out the deployed revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.deployment.sha || github.sha }}
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Validate Vercel deployment target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          origin="$(python - "${DEPLOYMENT_URL}" <<'PY'
          import re
          import sys
          from urllib.parse import urlsplit

          value = sys.argv[1].rstrip("/")
          parsed = urlsplit(value)
          host = parsed.hostname or ""
          allowed = re.fullmatch(r"datumguard-tjwnsdhfz(?:-[a-z0-9-]+)?\.vercel\.app", host)
          if parsed.scheme != "https" or parsed.username or parsed.password or parsed.port or parsed.path or not allowed:
              raise SystemExit(f"unsupported deployment origin: {value}")
          print(value)
          PY
          )"
          echo "origin=${origin}" >> "${GITHUB_OUTPUT}"

      - name: Determine release compatibility contract
        id: contract
        shell: bash
        env:
          ORIGIN: ${{ steps.target.outputs.origin }}
        run: |
          set -euo pipefail
          expected_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as stream:
              print(tomllib.load(stream)["project"]["version"])
          PY
          )"
          has_solid=false
          has_artifact=false
          [[ -f web/app/solid/page.tsx ]] && has_solid=true
          [[ -f web/app/intake/page.tsx ]] && has_artifact=true
          read -r manifest_solid manifest_artifact < <(python - <<'PY'
          import re
          from pathlib import Path

          text = Path("render.yaml").read_text(encoding="utf-8")

          def enabled(key: str) -> str:
              match = re.search(
                  rf"- key:\s*{re.escape(key)}\s*\n\s*value:\s*['\"]?([^'\"\s]+)",
                  text,
              )
              if match is None:
                  return "true"
              return "true" if match.group(1).lower() in {"1", "true", "yes", "on"} else "false"

          print(enabled("DATUMGUARD_ENABLE_SOLID"), enabled("DATUMGUARD_ENABLE_ARTIFACT_LAB"))
          PY
          )

          strict_version=false
          expected_solid=false
          expected_artifact=false
          case "${CAPABILITY_MODE}" in
            base) ;;
            full)
              strict_version=true
              expected_solid=true
              expected_artifact=true
              ;;
            auto)
              if [[ "${DEPLOYMENT_ENVIRONMENT}" == "Production" || "${ORIGIN}" == "https://datumguard-tjwnsdhfz.vercel.app" ]]; then
                strict_version=true
                if [[ "${has_solid}" == "true" ]]; then expected_solid="${manifest_solid}"; fi
                if [[ "${has_artifact}" == "true" ]]; then expected_artifact="${manifest_artifact}"; fi
              fi
              ;;
            *) echo "unsupported capability mode: ${CAPABILITY_MODE}" >&2; exit 1 ;;
          esac

          echo "expected_version=${expected_version}" >> "${GITHUB_OUTPUT}"
          echo "strict_version=${strict_version}" >> "${GITHUB_OUTPUT}"
          echo "expected_solid=${expected_solid}" >> "${GITHUB_OUTPUT}"
          echo "expected_artifact=${expected_artifact}" >> "${GITHUB_OUTPUT}"
          echo "Expected optional capabilities: solid=${expected_solid}, artifact=${expected_artifact}"
          if [[ "${strict_version}" != "true" && ( "${has_solid}" == "true" || "${has_artifact}" == "true" ) ]]; then
            echo "Preview compatibility mode: v0.2 web is checked against the currently deployed base API; optional canaries run only when advertised."
          fi

      - name: Verify DatumGuard page sentinels
        shell: bash
        env:
          ORIGIN: ${{ steps.target.outputs.origin }}
        run: |
          set -euo pipefail
          auth_headers=()
          if [[ -n "${VERCEL_BYPASS_SECRET}" ]]; then
            auth_headers+=(
              --header "x-vercel-protection-bypass: ${VERCEL_BYPASS_SECRET}"
            )
          fi

          routes=(/ /piping /plate)
          sentinels=('data-testid="architecture-demo"' 'data-testid="piping-demo"' 'data-testid="plate-designer"')
          if [[ -f web/app/solid/page.tsx ]]; then
            routes+=(/solid)
            sentinels+=('data-testid="solid-workspace"')
          fi
          if [[ -f web/app/intake/page.tsx ]]; then
            routes+=(/intake)
            sentinels+=('data-testid="artifact-lab"')
          fi

          for index in "${!routes[@]}"; do
            body="$(mktemp)"
            status="$(curl --silent --show-error --output "${body}" --write-out '%{http_code}' \
              --location --max-redirs 3 \
              --connect-timeout 10 --max-time 45 \
              --header 'Accept: text/html' "${auth_headers[@]}" \
              "${ORIGIN}${routes[$index]}")"
            if [[ "${status}" != "200" ]]; then
              echo "Route ${routes[$index]} returned HTTP ${status}." >&2
              rm -f "${body}"
              exit 1
            fi
            if grep --ignore-case --quiet --extended-regexp '<title>Login . Vercel</title>|Vercel Authentication' "${body}"; then
              echo "Route ${routes[$index]} returned a Vercel login page. Configure VERCEL_AUTOMATION_BYPASS_SECRET." >&2
              rm -f "${body}"
              exit 1
            fi
            grep --fixed-strings --quiet "${sentinels[$index]}" "${body}" || {
              echo "Route ${routes[$index]} is missing sentinel ${sentinels[$index]}." >&2
              rm -f "${body}"
              exit 1
            }
            rm -f "${body}"
          done

      - name: Wake API and verify version and capabilities
        id: api
        shell: bash
        env:
          EXPECTED_VERSION: ${{ steps.contract.outputs.expected_version }}
          STRICT_VERSION: ${{ steps.contract.outputs.strict_version }}
          EXPECTED_SOLID: ${{ steps.contract.outputs.expected_solid }}
          EXPECTED_ARTIFACT: ${{ steps.contract.outputs.expected_artifact }}
        run: |
          set -euo pipefail
          health="${RUNNER_TEMP}/datumguard-health.json"
          domains="${RUNNER_TEMP}/datumguard-domains.json"
          attempts=12
          if [[ "${STRICT_VERSION}" == "true" ]]; then attempts=60; fi

          ready=false
          for ((attempt=1; attempt<=attempts; attempt++)); do
            if curl --fail --silent --show-error --connect-timeout 10 --max-time 60 \
                "${API_URL}/api/v1/health" --output "${health}" && \
              curl --fail --silent --show-error --connect-timeout 10 --max-time 30 \
                "${API_URL}/api/v1/domains" --output "${domains}" && \
              python - "${health}" "${domains}" "${EXPECTED_VERSION}" "${STRICT_VERSION}" "${EXPECTED_SOLID}" "${EXPECTED_ARTIFACT}" <<'PY'
          import json
          import sys

          health = json.load(open(sys.argv[1], encoding="utf-8"))
          domains = json.load(open(sys.argv[2], encoding="utf-8"))
          expected = sys.argv[3]
          strict = sys.argv[4] == "true"
          expected_solid = sys.argv[5] == "true"
          expected_artifact = sys.argv[6] == "true"
          ids = {item.get("id") for item in domains if isinstance(item, dict)}
          base = {"architecture", "plant_piping", "mechanical_ship_plate"}
          if health.get("status") != "ok" or not base.issubset(ids):
              raise SystemExit(1)
          if strict and health.get("version") != expected:
              raise SystemExit(1)
          for capability, required in {
              "solid_part": expected_solid,
              "artifact_lab": expected_artifact,
          }.items():
              if required and capability not in ids:
                  raise SystemExit(1)
              if strict and not required and capability in ids:
                  raise SystemExit(1)
          PY
            then
              ready=true
              break
            fi
            echo "API release contract not ready (attempt ${attempt}/${attempts}); waiting for Render/Vercel ordering to converge."
            sleep 10
          done
          if [[ "${ready}" != "true" ]]; then
            echo "API version/capability contract did not converge." >&2
            exit 1
          fi

          api_version="$(python -c 'import json,sys; print(json.load(open(sys.argv[1]))["version"])' "${health}")"
          solid_supported="$(python -c 'import json,sys; print(str(any(x.get("id") == "solid_part" for x in json.load(open(sys.argv[1])))).lower())' "${domains}")"
          artifact_supported="$(python -c 'import json,sys; print(str(any(x.get("id") == "artifact_lab" for x in json.load(open(sys.argv[1])))).lower())' "${domains}")"
          echo "version=${api_version}" >> "${GITHUB_OUTPUT}"
          echo "solid_supported=${solid_supported}" >> "${GITHUB_OUTPUT}"
          echo "artifact_supported=${artifact_supported}" >> "${GITHUB_OUTPUT}"
          echo "API version ${api_version}; solid=${solid_supported}, artifact=${artifact_supported}."

      - name: Run small architecture canary
        shell: bash
        run: |
          set -euo pipefail
          response="${RUNNER_TEMP}/architecture-canary.json"
          curl --fail --silent --show-error --connect-timeout 10 --max-time 120 \
            --header 'Content-Type: application/json' \
            --data-binary @fixtures/examples/architecture_four_room.json \
            "${API_URL}/api/v1/architecture/designs/run" --output "${response}"
          python - "${response}" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          summary = payload.get("summary") or {}
          assert payload.get("status") == "passed", payload.get("status")
          assert payload.get("bundle_base64"), "approval bundle missing"
          assert str(payload.get("contract_hash", "")).startswith("sha256:"), "contract hash missing"
          assert str(payload.get("artifact_hash", "")).startswith("sha256:"), "artifact hash missing"
          assert summary.get("gross_area_m2") == 96.0, summary
          assert len(payload.get("violations") or []) == 0, "unexpected violations"
          PY

      - name: Run small solid canary when the API advertises support
        if: steps.api.outputs.solid_supported == 'true'
        shell: bash
        run: |
          set -euo pipefail
          response="${RUNNER_TEMP}/solid-canary.json"
          curl --fail --silent --show-error --connect-timeout 10 --max-time 240 \
            --header 'Content-Type: application/json' \
            --data-binary @fixtures/examples/solid_mounting_plate.json \
            "${API_URL}/api/v1/solid/designs/run" --output "${response}"
          python - "${response}" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          summary = payload.get("summary") or {}
          assert payload.get("status") == "passed", payload.get("status")
          assert payload.get("step_base64"), "STEP payload missing"
          assert payload.get("bundle_base64"), "verified solid bundle missing"
          assert summary.get("valid_shape") is True, summary
          assert int(summary.get("solid_count", 0)) >= 1, summary
          assert len(payload.get("violations") or []) == 0, "unexpected violations"
          PY

      - name: Verify disabled Solid endpoint fails closed
        if: steps.api.outputs.solid_supported != 'true'
        shell: bash
        env:
          STRICT_VERSION: ${{ steps.contract.outputs.strict_version }}
        run: |
          set -euo pipefail
          response="${RUNNER_TEMP}/solid-disabled.json"
          status="$(curl --silent --show-error --connect-timeout 10 --max-time 60 \
            --header 'Content-Type: application/json' \
            --data-binary @fixtures/examples/solid_mounting_plate.json \
            --output "${response}" --write-out '%{http_code}' \
            "${API_URL}/api/v1/solid/designs/run")"
          if [[ "${STRICT_VERSION}" == "true" ]]; then
            [[ "${status}" == "503" ]]
            python - "${response}" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload.get("error", {}).get("code") == "DG_CAPABILITY_DISABLED", payload
          PY
          elif [[ "${status}" != "404" && "${status}" != "503" ]]; then
            echo "Disabled Solid route unexpectedly returned HTTP ${status}." >&2
            exit 1
          fi

      - name: Run small Artifact Lab canary when the API advertises support
        if: steps.api.outputs.artifact_supported == 'true'
        shell: bash
        run: |
          set -euo pipefail
          fixture="${RUNNER_TEMP}/artifact-canary.dxf"
          response="${RUNNER_TEMP}/artifact-canary.json"
          python - "${fixture}" <<'PY'
          import sys

          rows = [
              "0", "SECTION", "2", "HEADER", "9", "$ACADVER", "1", "AC1027",
              "9", "$INSUNITS", "70", "4", "0", "ENDSEC", "0", "SECTION",
              "2", "TABLES", "0", "ENDSEC", "0", "SECTION", "2", "BLOCKS",
              "0", "ENDSEC", "0", "SECTION", "2", "ENTITIES", "0", "LINE",
              "5", "10", "100", "AcDbEntity", "8", "AUDIT", "100", "AcDbLine",
              "10", "0", "20", "0", "30", "0", "11", "1200", "21", "0",
              "31", "0", "0", "ENDSEC", "0", "EOF", "",
          ]
          open(sys.argv[1], "wb").write("\n".join(rows).encode("ascii"))
          PY
          curl --fail --silent --show-error --connect-timeout 10 --max-time 120 \
            --form "file=@${fixture};type=image/vnd.dxf" \
            "${API_URL}/api/v1/artifacts/audit" --output "${response}"
          python - "${response}" <<'PY'
          import json
          import sys

          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload.get("status") == "audited", payload
          assert payload.get("format") == "dxf", payload
          assert str(payload.get("artifact_hash", "")).startswith("sha256:"), payload
          assert payload.get("approval_eligible") is False, payload
          PY

      - name: Verify deployment CORS access
        shell: bash
        env:
          ORIGIN: ${{ steps.target.outputs.origin }}
        run: |
          set -euo pipefail
          headers="$(curl --fail --silent --show-error --dump-header - --output /dev/null \
            --request OPTIONS \
            --header "Origin: ${ORIGIN}" \
            --header 'Access-Control-Request-Method: POST' \
            --header 'Access-Control-Request-Headers: content-type' \
            --retry 30 --retry-all-errors --retry-delay 10 --retry-max-time 600 \
            --connect-timeout 10 --max-time 30 \
            "${API_URL}/api/v1/architecture/designs/run" | tr -d '\r')"
          grep --fixed-strings --ignore-case \
            "access-control-allow-origin: ${ORIGIN}" <<<"${headers}"
