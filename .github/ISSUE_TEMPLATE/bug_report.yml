name: Bug report
description: 재현 가능한 DatumGuard 결함 또는 잘못된 PASS/FAIL을 보고합니다.
title: "[Bug]: "
labels:
  - bug
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        감사합니다. **기밀·독점 CAD/BIM, 고객명, 시설 배치, contract 원문, 로컬 경로, token을 첨부하지 마세요.**
        구조 관련 결과는 preliminary screening이며 structural certification이 아닙니다.

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: 문제가 발생한 주 경로를 선택해 주세요.
      options:
        - Architecture
        - Piping
        - FrameGuard
        - Plate
        - Solid
        - Artifact Lab
        - OpenBIM
        - API
        - MCP
        - Documentation or deployment
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: "예: v0.3.0, commit SHA, public deployment URL"
      placeholder: v0.3.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Python/Node, Rhino/Grasshopper version 등 재현에 필요한 환경입니다.
      placeholder: |
        OS: Windows 11
        Browser: Chrome 138
        Python: 3.12
        Rhino/Grasshopper: 해당 시 기재
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: 공개 fixture 또는 새로 만든 최소 비식별 fixture로 단계별 재현법을 적어 주세요.
      placeholder: |
        1. Load fixture ...
        2. Call endpoint ...
        3. Observe status ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: 예상 status, measurement, violation 또는 export gate를 적어 주세요.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: 실제 status와 error code를 적고, secret이나 CAD payload가 없는 최소 log만 붙여 주세요.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Reproducible evidence
      description: 공개 fixture 경로, contract/artifact hash, test 이름을 적습니다. 비공개 파일은 올리지 마세요.
      placeholder: |
        Fixture: fixtures/examples/...
        contract_hash: ...
        artifact_hash: ...
        Test: tests/test_....py::test_...

  - type: dropdown
    id: assurance_impact
    attributes:
      label: Assurance impact
      description: 잘못된 PASS 또는 부적격 official export 가능성이 있습니까?
      options:
        - Wrong PASS or unverified export may be possible
        - Incorrect FAIL or blocked valid export
        - UI or documentation only
        - Unknown
    validations:
      required: true

  - type: checkboxes
    id: data_safety
    attributes:
      label: Data safety confirmation
      options:
        - label: 이 보고서에 기밀·독점 CAD/BIM, 개인정보, contract 원문, secret, 내부 경로를 포함하지 않았습니다.
          required: true
        - label: 구조 결과가 preliminary screening이며 structural certification이 아님을 이해했습니다.
          required: true
        - label: 공개 fixture 또는 재배포 권한이 있는 최소 예제로 재현할 수 있습니다.
          required: true
