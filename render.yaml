services:
  - type: web
    name: datumguard-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    autoDeployTrigger: checksPass
    envVars:
      - key: DATUMGUARD_CORS_ORIGINS
        sync: false
      - key: DATUMGUARD_CORS_ORIGIN_REGEX
        value: '^https://datumguard-tjwnsdhfz-[a-z0-9-]+\.vercel\.app$'
