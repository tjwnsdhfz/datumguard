<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">DatumGuard social preview</title>
  <desc id="desc">Technical split layout showing DatumGuard's fail-closed CAD verification pipeline.</desc>
  <defs>
    <pattern id="minorGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#1c1c21" stroke-width="1"/>
    </pattern>
    <pattern id="majorGrid" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="url(#minorGrid)"/>
      <path d="M120 0H0V120" fill="none" stroke="#29292f" stroke-width="1"/>
    </pattern>
    <clipPath id="rightClip"><rect x="748" y="72" width="468" height="496"/></clipPath>
  </defs>

  <rect width="1280" height="640" fill="#09090b"/>
  <rect x="28" y="28" width="1224" height="584" fill="none" stroke="#3a3a40"/>
  <path d="M28 72H1252M28 568H1252M716 72V568" fill="none" stroke="#3a3a40"/>

  <!-- technical corner registration marks -->
  <g fill="#f5f5f2">
    <rect x="24" y="24" width="8" height="8"/><rect x="1248" y="24" width="8" height="8"/>
    <rect x="24" y="608" width="8" height="8"/><rect x="1248" y="608" width="8" height="8"/>
  </g>

  <!-- top rail -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="2">
    <text x="52" y="56" fill="#8f8f98">DG / ENGINEERING ASSURANCE</text>
    <text x="1228" y="56" fill="#8f8f98" text-anchor="end">RELEASE 0.3.0</text>
  </g>

  <!-- left editorial panel -->
  <g font-family="Inter, Arial, sans-serif">
    <text x="60" y="164" fill="#f6f6f3" font-size="76" font-weight="760" letter-spacing="-3">DatumGuard</text>
    <rect x="60" y="193" width="76" height="4" fill="#43d9a3"/>
    <text x="60" y="260" fill="#f6f6f3" font-size="38" font-weight="650" letter-spacing="-1">
      <tspan x="60" dy="0">Fail-closed verification</tspan>
      <tspan x="60" dy="49">for AI-assisted CAD.</tspan>
    </text>
    <text x="60" y="392" fill="#a6a6ae" font-size="20">
      <tspan x="60" dy="0">A generated drawing is not accuracy evidence.</tspan>
      <tspan x="60" dy="31">Reopen the artifact. Remeasure it. Then export.</tspan>
    </text>
  </g>

  <!-- evidence chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="600">
    <g transform="translate(60 472)"><rect width="146" height="42" fill="#111115" stroke="#46464d"/><circle cx="20" cy="21" r="4" fill="#43d9a3"/><text x="34" y="26" fill="#e4e4e1">CONTRACT</text></g>
    <g transform="translate(216 472)"><rect width="130" height="42" fill="#111115" stroke="#46464d"/><circle cx="20" cy="21" r="4" fill="#43d9a3"/><text x="34" y="26" fill="#e4e4e1">REOPEN</text></g>
    <g transform="translate(356 472)"><rect width="144" height="42" fill="#111115" stroke="#46464d"/><circle cx="20" cy="21" r="4" fill="#43d9a3"/><text x="34" y="26" fill="#e4e4e1">REMEASURE</text></g>
    <g transform="translate(510 472)"><rect width="144" height="42" fill="#14382d" stroke="#43d9a3"/><circle cx="20" cy="21" r="4" fill="#43d9a3"/><text x="34" y="26" fill="#f4fff9">APPROVED</text></g>
  </g>

  <!-- right visual panel -->
  <g clip-path="url(#rightClip)">
    <rect x="748" y="72" width="468" height="496" fill="url(#majorGrid)"/>

    <!-- construction axes -->
    <g stroke-width="2" fill="none">
      <path d="M790 502H1178M790 502V116" stroke="#505058"/>
      <path d="M790 502l18-7v14zM790 116l-7 18h14z" fill="#505058" stroke="none"/>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#777781">
      <text x="1164" y="523">X</text><text x="772" y="131">Y</text><text x="772" y="523">0,0</text>
    </g>

    <!-- structural frame / CAD geometry -->
    <g fill="none" stroke="#d8d8dc" stroke-width="4" stroke-linejoin="miter">
      <path d="M842 438V238H1118V438"/>
      <path d="M842 238L980 344L1118 238M980 344V438"/>
      <path d="M828 438H856M966 438H994M1104 438H1132" stroke="#8c8c95" stroke-width="2"/>
    </g>
    <g fill="#09090b" stroke="#43d9a3" stroke-width="3">
      <circle cx="842" cy="438" r="7"/><circle cx="980" cy="438" r="7"/><circle cx="1118" cy="438" r="7"/>
      <circle cx="842" cy="238" r="7"/><circle cx="980" cy="344" r="7"/><circle cx="1118" cy="238" r="7"/>
    </g>

    <!-- dimension evidence -->
    <g fill="none" stroke="#777781" stroke-width="1.5">
      <path d="M842 210V180M1118 210V180M842 192H1118"/>
      <path d="M842 192l12-5v10zM1118 192l-12-5v10z" fill="#777781" stroke="none"/>
    </g>
    <text x="980" y="177" fill="#b8b8bf" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">8000.000 mm</text>

    <!-- approval panel -->
    <g transform="translate(820 100)">
      <rect width="328" height="48" fill="#111115" stroke="#43d9a3"/>
      <circle cx="24" cy="24" r="7" fill="#43d9a3"/>
      <text x="44" y="21" fill="#8f8f98" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="1.5">INDEPENDENT GATE</text>
      <text x="44" y="36" fill="#f2fff9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="700">0.001 mm · VERIFIED</text>
    </g>
  </g>

  <!-- bottom rail -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" letter-spacing="1.5">
    <text x="52" y="595" fill="#8f8f98">RHINO/GH · DXF · IFC · STEP</text>
    <text x="1228" y="595" fill="#43d9a3" text-anchor="end">OPEN SOURCE / REPRODUCIBLE EVIDENCE</text>
  </g>
</svg>
